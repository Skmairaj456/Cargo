services:
  db:
    image: postgres:16-alpine
    container_name: quickcargo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quickcargo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - quickcargo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quickcargo"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: quickcargo-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/quickcargo
      JWT_SECRET: quickcargo_super_secret_change_me
      DB_SSL: "false"
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000
    container_name: quickcargo-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  quickcargo_pgdata:
