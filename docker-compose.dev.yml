# Development stack: bind-mount source so edits apply without rebuilding images.
# Usage (from project root):
#   docker compose -f docker-compose.dev.yml up
# Frontend: http://localhost:5173  |  API: http://localhost:5000
# Stop production stack first if ports 5000/5432/5173 are in use.

services:
  db:
    image: postgres:16-alpine
    container_name: quickcargo-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: quickcargo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - quickcargo_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quickcargo"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: quickcargo-server-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/quickcargo
      JWT_SECRET: quickcargo_super_secret_change_me
      DB_SSL: "false"
    ports:
      - "5000:5000"
    volumes:
      # Live code from your machine
      - ./server:/app
      # Keep node_modules inside a volume so the host mount does not wipe them
      - server_node_modules:/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ]; then npm ci; fi && npm run dev"

  client:
    image: node:20-alpine
    container_name: quickcargo-client-dev
    working_dir: /app
    depends_on:
      - server
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  quickcargo_pgdata_dev:
  server_node_modules:
  client_node_modules:
